<h2 mat-dialog-title>Create New Release</h2>

<mat-dialog-content style="min-width: 480px; max-height: 60vh;">
  <form [formGroup]="form">
    <mat-form-field class="full-width" appearance="outline">
      <mat-label>Version</mat-label>
      <input matInput formControlName="version" placeholder="e.g. 2.15.0" />
      <mat-hint>Format: X.Y.Z</mat-hint>
      <mat-error *ngIf="form.get('version')?.hasError('pattern')">
        Version must follow X.Y.Z format (e.g. 2.15.0)
      </mat-error>
      <mat-error *ngIf="form.get('version')?.hasError('required')">
        Version is required
      </mat-error>
    </mat-form-field>
  </form>

  <div style="margin-top: 20px;">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
      <strong>Repositories ({{ selectedRepos.size }} / {{ repos.length }} selected)</strong>
      <button mat-stroked-button (click)="toggleAll()" [disabled]="loadingRepos">
        {{ allSelected ? 'Deselect All' : 'Select All' }}
      </button>
    </div>

    <div *ngIf="loadingRepos" style="text-align: center; padding: 24px;">
      <mat-spinner diameter="32"></mat-spinner>
    </div>

    <mat-selection-list *ngIf="!loadingRepos" style="max-height: 300px; overflow-y: auto; border: 1px solid #e0e0e0; border-radius: 4px;">
      <mat-list-option
        *ngFor="let repo of repos"
        [value]="repo.name"
        [selected]="selectedRepos.has(repo.name)"
        (click)="toggleRepo(repo.name)"
      >
        <span matListItemTitle>{{ repo.name }}</span>
        <span matListItemLine>{{ repo.path_with_namespace }}</span>
      </mat-list-option>
    </mat-selection-list>
  </div>

  <div *ngIf="errorMessage" style="margin-top: 12px; color: #c62828; font-size: 14px;">
    {{ errorMessage }}
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button
    mat-raised-button
    color="primary"
    [disabled]="!canSubmit"
    (click)="submit()"
  >
    <mat-spinner *ngIf="submitting" diameter="18" style="display: inline-block; margin-right: 8px;"></mat-spinner>
    Create Release
  </button>
</mat-dialog-actions>
